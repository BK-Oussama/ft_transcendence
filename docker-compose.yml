
services:


  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    image: mariadb
    env_file: .env
    restart: always
    networks:
      - inception_net
    volumes:
      - mariadb-data:/var/lib/mysql

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    image: wordpress
    env_file: .env
    restart: always
    depends_on:
      - mariadb
    networks:
      - inception_net
    volumes:
      - website-data:/var/www/html

  ngnix:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    image: ngnix
    env_file: .env
    restart: always
    depends_on:
      - wordpress
    networks:
      - inception_net
    volumes:
      - website-data:/var/www/html
    ports:
      - "443:443"







networks:
  inception_net:
    driver: bridge


volumes:
  website-data:
    name: wordpress
    driver: local
    driver_opts:
      type: 'none'
      o: bind
      device: /home/ouboukou/data/wordpress
  mariadb-data:
    name: mariadb
    driver: local
    driver_opts:
      type: 'none'
      o: bind
      device: /home/ouboukou/data/mariadb