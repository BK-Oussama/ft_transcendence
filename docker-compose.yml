services:
  # --- The Frontend ---
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - transcendence-net
    restart: always

  # --- The frontend DEV ---
  frontend-dev:
    image: node:lts-alpine
    container_name: frontend-dev
    working_dir: /app
    volumes:
      - ./services/frontend/app:/app
      - /app/node_modules
    # We don't even need to expose 5173 to your host anymore! 
    # The Gateway handles it on 443.
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - transcendence-net    
  
  # --- The API Gateway ---
  gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "443:443"
    networks:
      - transcendence-net
    depends_on:
      - frontend
    restart: always


# --- Network Definition ---
networks:
  transcendence-net:
    driver: bridge