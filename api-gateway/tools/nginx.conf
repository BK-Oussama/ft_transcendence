server {
    listen 443 ssl;
    server_name localhost;

    # --- SSL CONFIGURATION ---
    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 1. Frontend Dev (Vite HMR)
    location / {
        # Pointing to your host machine for local frontend testing
    #   proxy_pass http://197.230.240. 146:5173; 
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # 🚦 RESOURCE-BASED MICROSERVICE ROUTING
    # ==========================================

    # --- PROJECTS (Routed to Dashboard Service) ---
    location /api/projects/ {
        # Secretly maps /api/projects/... to the dashboard container
        proxy_pass https://dashboard:443/projects/; 
        proxy_ssl_verify off;
        proxy_set_header Host $host;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # --- TASKS & UPLOADS (Routed to Boards Service) ---
    location /api/tasks/ {
        # Secretly maps /api/tasks/... to the boards container
        proxy_pass https://boards:443/tasks/; 
        proxy_ssl_verify off;
        proxy_set_header Host $host;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # --- AUTHENTICATION ---
    location /api/auth/ {
        proxy_pass https://auth:443/; 
        proxy_ssl_verify off;
        proxy_set_header Host $host;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # --- CHAT ---
    location /api/chat/ {
        proxy_pass https://chat:443/; 
        proxy_ssl_verify off;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # --- WEBSOCKETS (Routed to Boards Service) ---
    location /api/socket.io/ {
        proxy_pass https://boards:443/socket.io/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }


    # projects public api
    # new block — public API
    location /api/v1/ {
        proxy_pass          https://dashboard:443/api/v1/;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_verify    off;              # matches your existing internal SSL setup
    }

    # new block — Swagger UI (remove in production if you want docs private)
    location /api/docs {
        proxy_pass          https://dashboard:443/api/docs;
        proxy_set_header    Host              $host;
        proxy_ssl_verify    off;
    }
}
